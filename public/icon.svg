<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <rect width="100" height="100" rx="22" fill="#0A0A0A"/>
  <g transform="translate(15, 15) scale(0.70)">
    <g stroke="#C8A97E" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <!-- Horizon road, gently curving -->
      <path d="M 8 76 Q 30 73, 50 74 T 92 76" stroke-width="2.2" opacity="0.7"/>
      <!-- Cross-grid line, dashed -->
      <path d="M 50 86 L 50 96" stroke-width="1.5" stroke-dasharray="2.5 2.5" opacity="0.5"/>
      <!-- Bloom halos under pin -->
      <ellipse cx="50" cy="74" rx="14" ry="2.3" stroke-width="1.7" opacity="0.6"/>
      <ellipse cx="50" cy="74" rx="8"  ry="1.4" stroke-width="1.7" opacity="0.85"/>
      <!-- Grain-pin -->
      <path d="M 50 22 C 56 32, 56 56, 50 70 C 44 56, 44 32, 50 22 Z" stroke-width="3"/>
      <!-- Interior crease -->
      <path d="M 50 30 L 50 60" stroke-width="1.5" opacity="0.5"/>
      <!-- Pin dot -->
      <circle cx="50" cy="74" r="2.2" fill="#C8A97E" stroke="none"/>
    </g>
  </g>
</svg>